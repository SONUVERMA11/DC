name: Build DC Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libffi-dev \
            libssl-dev \
            python3-venv \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            openjdk-17-jdk \
            lld

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          which buildozer
          buildozer --version
          which python
          python --version
          cython --version
          java -version

      - name: Build APK
        working-directory: android_app
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "Buildozer exit code: $?"

      - name: Show build log tail on failure
        if: failure()
        working-directory: android_app
        run: |
          echo "=== LAST 200 LINES OF BUILD LOG ==="
          tail -200 build.log || echo "No build.log found"
          echo ""
          echo "=== ERRORS IN BUILD LOG ==="
          grep -i -E "(error|exception|failed|traceback)" build.log | tail -50 || echo "No errors found in log"

      - name: Find APK files
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo ""
          echo "=== Listing android_app/bin/ ==="
          ls -laR android_app/bin/ 2>/dev/null || echo "bin/ directory not found"
          echo ""
          echo "=== Checking buildozer output ==="
          find android_app/.buildozer -name "*.apk" -type f 2>/dev/null || echo "No APK in .buildozer"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_app/build.log
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dc-debug-apk
          path: |
            android_app/bin/
            android_app/.buildozer/**/outputs/apk/
          if-no-files-found: warn
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android_app/bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
