name: Build DC Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libffi-dev \
            libssl-dev \
            python3-venv \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            openjdk-17-jdk \
            lld

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          which buildozer
          buildozer --version
          which python
          python --version
          cython --version
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Build APK
        working-directory: android_app
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log
          echo "Buildozer exit code: $?"

      - name: Show build log tail on failure
        if: failure()
        working-directory: android_app
        run: |
          echo "=== LAST 200 LINES OF BUILD LOG ==="
          tail -200 build.log || echo "No build.log found"
          echo ""
          echo "=== ERRORS IN BUILD LOG ==="
          grep -i -E "(error|exception|failed|traceback)" build.log | tail -50 || echo "No errors found in log"

      - name: Find APK files
        if: always()
        id: find_apk
        run: |
          echo "=== Searching for APK files ==="
          APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found: $APK_PATH"
          echo ""
          echo "=== Listing android_app/bin/ ==="
          ls -laR android_app/bin/ 2>/dev/null || echo "bin/ directory not found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_app/build.log
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dc-debug-apk
          path: |
            android_app/bin/
            android_app/.buildozer/**/outputs/apk/
          if-no-files-found: warn
          retention-days: 30

      # ── Firebase App Distribution ──
      - name: Upload to Firebase App Distribution
        if: success() && env.FIREBASE_APP_ID != ''
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: ${{ steps.find_apk.outputs.APK_PATH }}
          releaseNotes: |
            DC v2.0.0 — YouTube MP3 Downloader
            • Modernized premium UI with gradient header
            • New app icon
            • Dark & light theme support
            • Built from commit ${{ github.sha }}
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android_app/bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
