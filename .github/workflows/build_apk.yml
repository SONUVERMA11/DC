name: Build DC Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libffi-dev \
            libssl-dev \
            python3-venv \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            openjdk-17-jdk \
            lld

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.36
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          which buildozer
          buildozer --version
          which python
          python --version

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            android_app/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android_app/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        working-directory: android_app
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Find APK files
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Listing android_app/bin/ ==="
          ls -la android_app/bin/ 2>/dev/null || echo "bin/ directory not found"
          echo "=== Listing buildozer output ==="
          ls -la android_app/.buildozer/android/platform/build-*/dists/*/build/outputs/apk/ 2>/dev/null || echo "No buildozer APK output found"
          
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_app/build.log
          retention-days: 7

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dc-debug-apk
          path: |
            android_app/bin/*.apk
            android_app/.buildozer/**/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android_app/bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
