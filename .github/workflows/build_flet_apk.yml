name: Build DC APK (Flet)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install Flet
        run: pip install flet>=0.25.0

      - name: Build APK
        working-directory: flet_app
        run: |
          flet build apk --verbose \
            --project "DC" \
            --org "com.dc" \
            --product "DC" \
            --build-version "2.0.0" \
            --build-number 2

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find flet_app -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"
          ls -laR flet_app/build/ 2>/dev/null || echo "No build dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dc-flet-apk
          path: |
            flet_app/build/apk/
            flet_app/build/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── Firebase (optional) ──
      - name: Upload to Firebase
        if: success() && env.FIREBASE_APP_ID != ''
        continue-on-error: true
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: ${{ steps.find_apk.outputs.APK_PATH }}
          releaseNotes: "DC v2.0 (Flet) — commit ${{ github.sha }}"
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
